const state = {
  currentYear: new Date().getFullYear(),
  view: 'year', // year | remessa
  currentRemessa: null,
  currentMonth: null,
  filterStatus: null,
  filterSupplier: null,
  searchQuery: '',
  data: {}, // { [year]: { models: [ {...} ] } }
  photoCache: new Map(),
  userPhotos: {}, // userId -> base64
  currentUser: null,
  viewMode: 'grid', // grid | lookbook
  theme: 'dark', // dark | light
  loading: false
};
// Expose for debugging in browser console
window.state = state;

function canUser(action) {
  if (!state.currentUser) return false;
  const perms = PERMISSIONS[state.currentUser];
  return perms && perms[action];
}

// ============================================================
// STORAGE
// ============================================================
const STORAGE_KEY = 'loretto_collections_v1';
const PHOTO_PREFIX = 'loretto_photo_';
const USER_KEY = 'loretto_current_user';
const USER_PHOTO_PREFIX = 'loretto_user_photo_';
const THEME_KEY = 'loretto_theme';
const VIEW_MODE_KEY = 'loretto_view_mode';

// Firestore collection names
const FIRESTORE_COLLECTION = 'colecoes_modelos';   // /colecoes_modelos/{year}
const FIRESTORE_USERS_COLLECTION = 'colecoes_users'; // /colecoes_users/{userId}
const STORAGE_BUCKET_MODELS = 'colecoes_modelos';  // path prefix in Storage
const STORAGE_BUCKET_USERS  = 'colecoes_users';

// Real-time listener cleanup function
let firestoreUnsubscribe = null;

const hasStorage = typeof window !== 'undefined' && window.storage;
const useFirebase = () => firebaseEnabled && firebaseAuth?.currentUser;

// ============================================================
// SYNC STATUS UI
// ============================================================
function setSyncStatus(state, message) {
  const el = document.getElementById('syncStatus');
  const text = document.getElementById('syncStatusText');
  if (!el) return;
  el.classList.remove('offline', 'syncing');
  if (state) el.classList.add(state);
  if (text) text.textContent = message || 'Sincronizado';
  el.classList.add('show');
  if (state === null || state === '') {
    setTimeout(() => el.classList.remove('show'), 2000);
  }
}

// ============================================================
// DATA LOADING (Firebase or localStorage fallback)
// ============================================================
async function loadAll() {
  if (useFirebase()) {
    return await loadAllFromFirestore();
  }
  return await loadAllFromLocalStorage();
}

async function loadAllFromLocalStorage() {
  state.loading = true;
  try {
    if (hasStorage) {
      const result = await window.storage.get(STORAGE_KEY, true);
      if (result && result.value) {
        state.data = JSON.parse(result.value);
      }
    } else {
      const local = localStorage.getItem(STORAGE_KEY);
      if (local) state.data = JSON.parse(local);
    }
  } catch (err) {
    state.data = {};
  }
  state.loading = false;
}

async function loadAllFromFirestore() {
  state.loading = true;
  setSyncStatus('syncing', 'Carregando...');
  try {
    // Load all year documents from Firestore
    const snapshot = await firebaseDb.collection(FIRESTORE_COLLECTION).get();
    state.data = {};
    snapshot.forEach(doc => {
      const yearData = doc.data();
      state.data[doc.id] = {
        models: Array.isArray(yearData.models) ? yearData.models : []
      };
    });
    setSyncStatus('', 'Sincronizado');
  } catch (err) {
    console.error('Firestore load failed:', err);
    setSyncStatus('offline', 'Modo offline');
    // Fallback to localStorage cache
    await loadAllFromLocalStorage();
  }
  state.loading = false;
}

// ============================================================
// DATA SAVING
// ============================================================
async function saveAll() {
  // Always save to localStorage as offline cache
  const json = JSON.stringify(state.data);
  try {
    if (hasStorage) {
      await window.storage.set(STORAGE_KEY, json, true);
    } else {
      localStorage.setItem(STORAGE_KEY, json);
    }
  } catch (err) {
    if (err.name === 'QuotaExceededError' || /quota/i.test(err.message || '')) {
      // Quota exceeded on local cache — not critical if Firebase is on, but warn user
      if (!useFirebase()) {
        showToast('⚠ Memória cheia — exporte e limpe fotos antigas');
        return false;
      }
    } else {
      console.error('Local cache save failed:', err);
    }
  }

  // Save to Firestore (primary store)
  if (useFirebase()) {
    return await saveAllToFirestore();
  }
  return true;
}

async function saveAllToFirestore() {
  setSyncStatus('syncing', 'Salvando...');
  try {
    // Save each year as a separate document for efficient updates
    const batch = firebaseDb.batch();
    for (const year in state.data) {
      const ref = firebaseDb.collection(FIRESTORE_COLLECTION).doc(String(year));
      batch.set(ref, {
        models: state.data[year].models || [],
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: state.currentUser || 'unknown'
      });
    }
    await batch.commit();
    setSyncStatus('', 'Sincronizado');
    return true;
  } catch (err) {
    console.error('Firestore save failed:', err);
    setSyncStatus('offline', 'Falha ao salvar — tentando novamente');
    showToast('⚠ Sem conexão — alterações salvas localmente');
    return false;
  }
}

// ============================================================
// PHOTO STORAGE
// ============================================================
async function savePhoto(photoId, base64) {
  state.photoCache.set(photoId, base64);

  if (useFirebase()) {
    return await savePhotoToFirebase(photoId, base64);
  }

  // localStorage fallback
  try {
    if (hasStorage) {
      await window.storage.set(PHOTO_PREFIX + photoId, base64, true);
    } else {
      localStorage.setItem(PHOTO_PREFIX + photoId, base64);
    }
    return true;
  } catch (err) {
    if (err.name === 'QuotaExceededError' || /quota/i.test(err.message || '')) {
      state.photoCache.delete(photoId);
      showToast('⚠ Sem espaço — apague modelos antigos para liberar memória');
      return false;
    }
    showToast('Erro ao salvar foto');
    return false;
  }
}

async function savePhotoToFirebase(photoId, base64) {
  setSyncStatus('syncing', 'Enviando foto...');
  try {
    // Convert base64 to blob
    const response = await fetch(base64);
    const blob = await response.blob();

    const ref = firebaseStorage.ref(`${STORAGE_BUCKET_MODELS}/${photoId}.jpg`);
    await ref.put(blob, { contentType: 'image/jpeg' });
    setSyncStatus('', 'Sincronizado');
    return true;
  } catch (err) {
    console.error('Firebase photo upload failed:', err);
    setSyncStatus('offline', 'Foto salva offline');
    return false;
  }
}

async function loadPhoto(photoId) {
  if (state.photoCache.has(photoId)) return state.photoCache.get(photoId);

  if (useFirebase()) {
    try {
      const ref = firebaseStorage.ref(`${STORAGE_BUCKET_MODELS}/${photoId}.jpg`);
      const url = await ref.getDownloadURL();
      state.photoCache.set(photoId, url);
      return url;
    } catch (err) {
      // Photo doesn't exist in Firebase — try localStorage
    }
  }

  // localStorage fallback
  try {
    if (hasStorage) {
      const result = await window.storage.get(PHOTO_PREFIX + photoId, true);
      if (result && result.value) {
        state.photoCache.set(photoId, result.value);
        return result.value;
      }
    } else {
      const local = localStorage.getItem(PHOTO_PREFIX + photoId);
      if (local) {
        state.photoCache.set(photoId, local);
        return local;
      }
    }
  } catch (err) { /* not found */ }
  return null;
}

async function deletePhoto(photoId) {
  state.photoCache.delete(photoId);

  // Try delete from Firebase
  if (useFirebase()) {
    try {
      await firebaseStorage.ref(`${STORAGE_BUCKET_MODELS}/${photoId}.jpg`).delete();
    } catch (err) { /* may not exist */ }
  }

  // Also clean up localStorage cache
  try {
    if (hasStorage) {
      await window.storage.delete(PHOTO_PREFIX + photoId, true);
    } else {
      localStorage.removeItem(PHOTO_PREFIX + photoId);
    }
  } catch (err) { /* ignore */ }
}

// ============================================================
// USER SESSION
// ============================================================
async function loadCurrentUser() {
  // If Firebase auth is set, the user is determined by the authenticated email
  if (useFirebase()) {
    const email = firebaseAuth.currentUser?.email?.toLowerCase();
    if (email && AUTHORIZED_USERS[email]) {
      state.currentUser = AUTHORIZED_USERS[email];
      return;
    }
  }
  // localStorage fallback
  try {
    if (hasStorage) {
      const result = await window.storage.get(USER_KEY, false);
      if (result && result.value) state.currentUser = result.value;
    } else {
      const local = localStorage.getItem(USER_KEY);
      if (local) state.currentUser = local;
    }
  } catch (err) {
    state.currentUser = null;
  }
}

async function saveCurrentUser(userId) {
  state.currentUser = userId;
  // Also save locally so Firebase-less mode remembers
  try {
    if (hasStorage) {
      await window.storage.set(USER_KEY, userId, false);
    } else {
      localStorage.setItem(USER_KEY, userId);
    }
  } catch (err) { console.error(err); }
}

// ============================================================
// USER PROFILE PHOTOS (Firebase or localStorage)
// ============================================================
async function loadUserPhoto(userId) {
  if (state.userPhotos[userId] !== undefined && state.userPhotos[userId] !== null) {
    return state.userPhotos[userId];
  }

  if (useFirebase()) {
    try {
      const ref = firebaseStorage.ref(`${STORAGE_BUCKET_USERS}/${userId}.jpg`);
      const url = await ref.getDownloadURL();
      state.userPhotos[userId] = url;
      return url;
    } catch (err) { /* fall through */ }
  }

  try {
    if (hasStorage) {
      const result = await window.storage.get(USER_PHOTO_PREFIX + userId, true);
      if (result && result.value) {
        state.userPhotos[userId] = result.value;
        return result.value;
      }
    } else {
      const local = localStorage.getItem(USER_PHOTO_PREFIX + userId);
      if (local) {
        state.userPhotos[userId] = local;
        return local;
      }
    }
  } catch (err) { /* not found */ }

  // Fall back to default embedded avatar
  const fallback = DEFAULT_USER_PHOTOS[userId] || null;
  state.userPhotos[userId] = fallback;
  return fallback;
}

async function saveUserPhoto(userId, base64) {

      await ref.put(blob, { contentType: 'image/jpeg' });

    } catch (err) {
      console.error('Firebase user photo upload failed:', err);
    }
  }

  try {
    if (hasStorage) {
      await window.storage.set(USER_PHOTO_PREFIX + userId, base64, true);
    } else {
      localStorage.setItem(USER_PHOTO_PREFIX + userId, base64);
    }
  } catch (err) {
    showToast('Erro ao salvar foto');
    console.error(err);
  }
}

// ============================================================
// REAL-TIME SYNC (Firestore listener)
// ============================================================
function startRealtimeSync() {
  if (!useFirebase()) return;
  // Cleanup any existing listener
  if (firestoreUnsubscribe) firestoreUnsubscribe();

  firestoreUnsubscribe = firebaseDb.collection(FIRESTORE_COLLECTION)
    .onSnapshot((snapshot) => {
      // Don't disrupt user if they're editing in a modal
      const modalOpen = document.getElementById('modalBg')?.classList.contains('show');

      let changed = false;
      snapshot.docChanges().forEach(change => {
        const yearData = change.doc.data();
        const year = change.doc.id;
        if (change.type === 'added' || change.type === 'modified') {
          state.data[year] = {
            models: Array.isArray(yearData.models) ? yearData.models : []
          };
          changed = true;
        } else if (change.type === 'removed') {
          delete state.data[year];
          changed = true;
        }
      });

      if (changed && !modalOpen) {
        // Re-render to show updates
        if (state.view === 'year') renderYearView();
        else if (state.view === 'remessa') renderRemessaView();
      }
    }, (err) => {
      console.error('Firestore realtime sync error:', err);
      setSyncStatus('offline', 'Sem conexão');
    });
}

function stopRealtimeSync() {
  if (firestoreUnsubscribe) {
    firestoreUnsubscribe();
    firestoreUnsubscribe = null;
  }
}

// ============================================================
// FIREBASE AUTHENTICATION
// ============================================================
async function firebaseLogin(email, password) {
  try {
    const credential = await firebaseAuth.signInWithEmailAndPassword(email.trim(), password);
    return { success: true, user: credential.user };
  } catch (err) {
    let message = 'Erro ao entrar';
    if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
      message = 'Email ou senha incorretos';
    } else if (err.code === 'auth/user-not-found') {
      message = 'Usuário não encontrado';
    } else if (err.code === 'auth/invalid-email') {
      message = 'Email inválido';
    } else if (err.code === 'auth/too-many-requests') {
      message = 'Muitas tentativas. Tente em alguns minutos';
    } else if (err.code === 'auth/network-request-failed') {
      message = 'Sem conexão com a internet';
    }
    return { success: false, message };
  }
}

async function firebaseSignOut() {
  try {
    stopRealtimeSync();
    await firebaseAuth.signOut();
    state.currentUser = null;
    state.data = {};
    state.photoCache.clear();
    state.userPhotos = {};
    // Clear local cache too
    try {
      if (hasStorage) {
        await window.storage.delete(USER_KEY, false);
        await window.storage.delete(STORAGE_KEY, true);
      } else {
        localStorage.removeItem(USER_KEY);
        localStorage.removeItem(STORAGE_KEY);
      }
    } catch (err) { /* ignore */ }
    // Show login screen
    showLoginScreen();
  } catch (err) {
    console.error('Sign out failed:', err);
    showToast('Erro ao sair');
  }
}

function showLoginScreen() {
  document.getElementById('welcomeScreen')?.classList.remove('show');
  document.getElementById('loginScreen')?.classList.add('show');
  // Clear form
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').textContent = '';
}

function hideLoginScreen() {
  document.getElementById('loginScreen')?.classList.remove('show');
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const submit = document.getElementById('loginSubmit');

  if (!email || !password) {
    errEl.textContent = 'Preencha email e senha';
    return;
  }

  // Pre-check authorization
  if (!AUTHORIZED_USERS[email]) {
    errEl.textContent = 'Email não autorizado';
    return;
  }

  submit.disabled = true;
  submit.textContent = 'Entrando...';
  errEl.textContent = '';

  const result = await firebaseLogin(email, password);

  submit.disabled = false;
  submit.textContent = 'Entrar';

  if (!result.success) {
    errEl.textContent = result.message;
    return;
  }

  // Auth state change handler will take it from here
}

}

// ============================================================
// IMAGE COMPRESSION
// ============================================================
async function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxDim = 600;
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = (height * maxDim) / width;
          width = maxDim;
        } else if (height > maxDim) {
          width = (width * maxDim) / height;
          height = maxDim;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.78));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ============================================================
// MODEL OPS
// ============================================================
function createModelId() {
  return 'm_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
}

// Ensure model has all the new fields (backward compat for older saved data)
function migrateModel(m) {
  if (!m.tags) m.tags = [];
  if (!m.comments) m.comments = [];
  if (!m.history) m.history = [];
  if (typeof m.order !== 'number') m.order = m.createdAt || Date.now();
  if (!m.createdBy) m.createdBy = 'larissa'; // Legacy data assumed Larissa created
  if (!m.leather) m.leather = ''; // Default empty so old models don't auto-pick a type
  if (typeof m.pairs !== 'number') m.pairs = 0; // Quantity of pairs ordered
  // Strip legacy markupTier if it existed
  if ('markupTier' in m) delete m.markupTier;
  return m;
}

function addHistory(model, action) {
  if (!model.history) model.history = [];
  model.history.unshift({
    user: state.currentUser,
    userName: USERS[state.currentUser]?.name || 'Sistema',
    action,
    time: Date.now()
  });
  // Keep only the last 30 entries
  if (model.history.length > 30) model.history.length = 30;
}

function addComment(model, text) {
  if (!model.comments) model.comments = [];
  model.comments.push({
    id: 'c_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 5),
    user: state.currentUser,
    userName: USERS[state.currentUser]?.name || 'Anônimo',
    text,
    time: Date.now()
  });
}

function deleteCommentById(model, commentId) {
  if (!model.comments) return;
  model.comments = model.comments.filter(c => c.id !== commentId);
}

function findModel(year, id) {
  const yd = getYearData(year);
  const m = yd.models.find(m => m.id === id);
  return m ? migrateModel(m) : null;
}

async function upsertModel(year, modelData) {
  const yd = getYearData(year);
  const idx = yd.models.findIndex(m => m.id === modelData.id);
  if (idx >= 0) {
    yd.models[idx] = modelData;
  } else {
    yd.models.push(modelData);
  }
  await saveAll();
}

async function deleteModel(year, id) {
  const yd = getYearData(year);
  const m = yd.models.find(x => x.id === id);
  if (m && m.photoId) await deletePhoto(m.photoId);
  yd.models = yd.models.filter(x => x.id !== id);
  await saveAll();
}

async function duplicateModel(year, id) {
  const original = findModel(year, id);
  if (!original) return null;
  const copy = JSON.parse(JSON.stringify(original));
  copy.id = createModelId();
  copy.color = '';
  copy.photoId = null;
  copy.joiceApproved = false;
  copy.status = 'a_definir';
  copy.comments = [];
  copy.history = [];
  copy.order = Date.now();
  copy.createdAt = Date.now();
  addHistory(copy, `Duplicado de "${original.name}"`);
  await upsertModel(year, copy);
  return copy;
}

async function cycleStatus(model) {
  const idx = STATUSES.findIndex(s => s.id === model.status);
  const next = STATUSES[(idx + 1) % STATUSES.length];
  const prevLabel = STATUSES[idx].label;
  model.status = next.id;
  addHistory(model, `Status: ${prevLabel} → ${next.label}`);
  await saveAll();
  showToast(`Status: ${next.label}`);
}

async function toggleJoiceApproval(model) {
  model.joiceApproved = !model.joiceApproved;
  addHistory(model, model.joiceApproved ? 'Aprovado pela Joice' : 'Aprovação removida');
  await saveAll();
  showToast(model.joiceApproved ? 'Aprovado pela Joice' : 'Aprovação removida');
}

function getModelsFor(year, remessaId, month, category) {
  const yd = getYearData(year);
  return yd.models
    .filter(m =>
      m.remessaId === remessaId &&
      m.month === month &&
      m.category === category
    )
    .map(migrateModel)
    .sort((a, b) => (a.order || 0) - (b.order || 0));
}

function getRemessaCount(year, remessaId) {
  return getYearData(year).models.filter(m => m.remessaId === remessaId).length;
}

function getRemessaReceivedCount(year, remessaId) {
  return getYearData(year).models.filter(m => m.remessaId === remessaId && m.status === 'recebido').length;
}

function getYearTotal(year) {
  return getYearData(year).models.length;
}

function getYearByStatus(year, status) {
  return getYearData(year).models.filter(m => m.status === status).length;
}

// ---- Comparison with previous year (received models in same month) ----
function getPrevYearReceivedByCategory(year, remessaId, month) {
  const prev = getYearData(year - 1);
  const result = {};
  CATEGORIES.forEach(cat => { result[cat] = 0; });
  prev.models.forEach(m => {
    if (m.remessaId === remessaId &&
        m.month === month &&
        m.status === 'recebido' &&
        result[m.category] !== undefined) {
      result[m.category]++;
    }
  });
  return result;
}

function hasPrevYearData(year, remessaId, month) {
  const counts = getPrevYearReceivedByCategory(year, remessaId, month);
  return Object.values(counts).some(c => c > 0);
}

// ---- Supplier concentration alert ----
function getSupplierConcentration(year, remessaId, month) {
  const yd = getYearData(year);
  const monthModels = yd.models.filter(m =>
    m.remessaId === remessaId && m.month === month
  );
  if (monthModels.length < 4) return null; // Not enough to alert

  const counts = {};
  monthModels.forEach(m => {
    counts[m.supplier] = (counts[m.supplier] || 0) + 1;
  });

  const total = monthModels.length;
  let topSupplier = null;
  let topCount = 0;
  Object.entries(counts).forEach(([sup, n]) => {
    if (n > topCount) {
      topCount = n;
      topSupplier = sup;
    }
  });

  const ratio = topCount / total;
  if (ratio >= 0.6) {
    return { supplier: topSupplier, count: topCount, total, ratio };
  }
  return null;
}

// ---- Month completion ----
function isMonthComplete(year, remessaId, month) {
  const yd = getYearData(year);
  const models = yd.models.filter(m =>
    m.remessaId === remessaId && m.month === month
  );
  if (models.length === 0) return false;
  return models.every(m => m.status === 'pedido' || m.status === 'recebido');
}

function isRemessaComplete(year, remessaId) {
  const r = REMESSAS.find(x => x.id === remessaId);
  return r.months.every(m => isMonthComplete(year, remessaId, m));
}

// ============================================================
// DEADLINE TRACKING — based on days until the month starts
// ============================================================
// Rule: each month must be closed BEFORE the month begins.
//   > 45 days before month → safe (no alert)
//   40-45 days before     → "atenção" (yellow)
//   30-40 days before     → "urgente" (orange)
//   < 30 days before (or month already started) → "atrasado" (red, pulsing)
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// Returns the Date when a given month starts (1st day at 00:00)
function getMonthStartDate(year, monthName) {
  const monthIdx = MONTHS_PT.indexOf(monthName);
  if (monthIdx < 0) return null;
  return new Date(year, monthIdx, 1, 0, 0, 0, 0);
}

// Returns days until the month STARTS (negative = month already started)
function getDaysUntilMonth(year, monthName) {
  const monthStart = getMonthStartDate(year, monthName);
  if (!monthStart) return null;
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const ms = new Date(monthStart);
  ms.setHours(0, 0, 0, 0);
  const diffMs = ms.getTime() - now.getTime();
  return Math.round(diffMs / (24 * 60 * 60 * 1000));
}

// Backward-compat alias kept for any code that still uses it
function getDaysUntilDeadline(year, monthName) {
  return getDaysUntilMonth(year, monthName);
}

// Returns the Date deadline (45 days before month start) for legacy display
function getMonthDeadline(year, monthName) {
  const monthStart = getMonthStartDate(year, monthName);
  if (!monthStart) return null;
  return new Date(monthStart.getTime() - 45 * 24 * 60 * 60 * 1000);
}

// Returns the deadline status of a month
// Possible: 'closed' | 'safe' | 'attention' | 'urgent' | 'overdue'
function getMonthDeadlineStatus(year, remessaId, monthName) {
  // If already complete, it's closed (no deadline pressure)
  if (isMonthComplete(year, remessaId, monthName)) return 'closed';

  const days = getDaysUntilMonth(year, monthName);
  if (days === null) return 'safe';

  if (days > 45)        return 'safe';        // mais de 45 dias antes
  if (days > 40)        return 'attention';   // 41 a 45 dias antes
  if (days >= 30)       return 'urgent';      // 30 a 40 dias antes
  return 'overdue';                           // menos de 30 dias (incl. mês em curso ou já passado)
}

// Get all overdue/urgent months across the year (for top banner)
function getOverdueMonths(year) {
  const out = [];
  REMESSAS.forEach(r => {
    r.months.forEach(monthName => {
      const status = getMonthDeadlineStatus(year, r.id, monthName);
      if (status === 'overdue' || status === 'urgent') {
        out.push({
          remessaId: r.id,
          remessaLabel: r.label,
          month: monthName,
          status,
          days: getDaysUntilMonth(year, monthName)
        });
      }
    });
  });
  return out;
}

// Format a deadline message for the UI
function formatDeadlineMessage(days, status) {
  if (status === 'closed') return 'Fechado';
  if (status === 'overdue') {
    if (days < 0) {
      const d = Math.abs(days);
      return `Mês iniciado há ${d} ${d === 1 ? 'dia' : 'dias'}`;
    }
    return `${days} ${days === 1 ? 'dia' : 'dias'} pro mês começar`;
  }
  if (status === 'urgent' || status === 'attention') {
    return `${days} dias pro mês começar`;
  }
  return `${days} dias`;
}

// ---- Get hero photos for a remessa (first N photos available) ----
function getHeroPhotoIds(year, remessaId, max = 5) {
  const yd = getYearData(year);
  return yd.models
    .filter(m => m.remessaId === remessaId && m.photoId)
    .slice(0, max)
    .map(m => m.photoId);
}

function bindUserAvatarUpload(userId, container) {
  const editBtn = container.querySelector(`[data-edit="${userId}"]`);
  const fileInput = container.querySelector(`[data-photo-input="${userId}"]`);
  if (!editBtn || !fileInput) return;
  editBtn.onclick = (e) => { e.stopPropagation(); fileInput.click(); };
  fileInput.onclick = (e) => e.stopPropagation();
  fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    showToast('Processando foto...');
    try {
      const compressed = await compressImage(file);
      await saveUserPhoto(userId, compressed);
      renderWelcome();
      showToast('Foto atualizada');
    } catch (err) {
      showToast('Erro ao processar foto');
      console.error(err);
    }
  };
}

  await saveCurrentUser(userId);

  // Export dropdown — single trigger that opens menu with all export options
  const exportTrigger = document.getElementById('exportTriggerBtn');
  const exportDropdown = document.getElementById('exportDropdown');
  const exportMenu = document.getElementById('exportMenu');
  if (exportTrigger && exportDropdown && exportMenu) {
    exportTrigger.onclick = (e) => {
      e.stopPropagation();
      exportDropdown.classList.toggle('open');
    };
    // Click outside closes
    document.addEventListener('click', (e) => {
      if (!exportDropdown.contains(e.target)) exportDropdown.classList.remove('open');
    });
    // Each menu item dispatches the right action
    exportMenu.querySelectorAll('[data-export]').forEach(btn => {
      btn.onclick = () => {
        exportDropdown.classList.remove('open');
        const action = btn.dataset.export;
        if (action === 'excel') handleExportCSV();
        else if (action === 'general') handleGenerateSummary();
        else if (action === 'month') handleGenerateMonthSummary();
        else if (action === 'supplier') handleGenerateSupplierSummary();
      };
    });
  }
  // Hidden alias buttons for programmatic access (e.g., from tests or scripts)
  const aliasBindings = [
    ['exportExcelBtn',           handleExportCSV],
    ['generateSummaryBtn',       () => handleGenerateSummary()],
    ['generateMonthSummaryBtn',  () => handleGenerateMonthSummary()],
    ['generateSupplierSummaryBtn', () => handleGenerateSupplierSummary()]
  ];
  for (const [id, fn] of aliasBindings) {
    const el = document.getElementById(id);
    if (el) el.onclick = fn;
  }

  // Bind search
  const search = document.getElementById('searchInput');
  let searchTimer;
  search.oninput = () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.searchQuery = search.value.toLowerCase().trim();
      renderCategories();
    }, 200);
  };

  hydrateFooterAvatars();
  renderCategories();
}

function renderComparePanel() {
  const container = document.getElementById('comparePanel');
  if (!container) return;

  if (!hasPrevYearData(state.currentYear, state.currentRemessa, state.currentMonth)) {
    container.innerHTML = '';
    return;
  }

  const prevCounts = getPrevYearReceivedByCategory(
    state.currentYear, state.currentRemessa, state.currentMonth
  );

  // Current month progress (any status counts as "planned")
  const yd = getYearData(state.currentYear);
  const currentByCategory = {};
  CATEGORIES.forEach(cat => {
    currentByCategory[cat] = yd.models.filter(m =>
      m.remessaId === state.currentRemessa &&
      m.month === state.currentMonth &&
      m.category === cat
    ).length;
  });

  container.innerHTML = `
    <div class="compare-panel fade-in">
      <div class="compare-label">
        Mínimo sugerido
        <small>Recebidos em ${state.currentMonth}/${state.currentYear - 1}</small>
      </div>
      <div class="compare-grid">
        ${CATEGORIES.map(cat => {
          const min = prevCounts[cat];
          const planned = currentByCategory[cat];
          let statusClass = 'under';
          let barClass = 'under';
          let statusText = 'Sem referência';
          let pct = 0;

          if (min > 0) {
            pct = Math.min(100, (planned / min) * 100);
            if (planned >= min) {
              if (planned > min) {
                statusClass = 'over';
                barClass = 'over';
                statusText = `+${planned - min} acima`;
              } else {
                statusClass = 'ok';
                barClass = 'ok';
                statusText = 'No alvo';
              }
              pct = 100;
            } else if (planned > 0) {
              statusClass = 'warn';
              barClass = 'warn';
              statusText = `Faltam ${min - planned}`;
            } else {
              statusText = 'Não iniciado';
            }
          } else if (planned > 0) {
            statusClass = 'over';
            barClass = 'over';
            statusText = `${planned} novos`;
            pct = 100;
          } else {
            statusText = '—';
          }

          return `
            <div class="compare-cat">
              <div class="compare-cat-name">${cat}</div>
              <div class="compare-cat-row">
                <span class="compare-cat-current">${planned > 0 ? `<em>${planned}</em>` : '0'}</span>
                <span class="compare-cat-target">/ ${min || '—'}</span>
              </div>
              <div class="compare-cat-bar">
                <div class="compare-cat-bar-fill ${barClass}" style="width: ${pct}%"></div>
              </div>
              <div class="compare-cat-status-mini ${statusClass}">${statusText}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// Renders the standalone deadline bar below the totals (more legible than a chip)
function renderMonthDeadlineBar() {
  const container = document.getElementById('monthDeadlineBar');
  if (!container) return;

  const r = REMESSAS.find(x => x.id === state.currentRemessa);
  if (!r) { container.innerHTML = ''; return; }

  const dlStatus = getMonthDeadlineStatus(state.currentYear, r.id, state.currentMonth);
  const days = getDaysUntilMonth(state.currentYear, state.currentMonth);
  const monthStart = getMonthStartDate(state.currentYear, state.currentMonth);
  if (!monthStart) { container.innerHTML = ''; return; }
  const startFmt = monthStart.toLocaleDateString('pt-BR');
  const isComplete = isMonthComplete(state.currentYear, r.id, state.currentMonth);

  if (isComplete) {
    container.innerHTML = `
      <div class="month-deadline-bar dl-closed">
        <span class="month-deadline-icon">✓</span>
        <span class="month-deadline-text"><strong>Mês fechado</strong> · todos os modelos pedidos</span>
      </div>
    `;
    return;
  }

  const cls = dlStatus;
  const icon = dlStatus === 'overdue' ? '⚡'
             : dlStatus === 'urgent' ? '⏱'
             : dlStatus === 'attention' ? '📅'
             : '📅';
  let msg;
  if (dlStatus === 'overdue') {
    if (days < 0) {
      const d = Math.abs(days);
      msg = `<strong>Atrasado · mês iniciado há ${d} ${d === 1 ? 'dia' : 'dias'}</strong> (em ${startFmt})`;
    } else if (days === 0) {
      msg = `<strong>Atrasado · mês começa hoje</strong>`;
    } else {
      msg = `<strong>Atrasado</strong> · faltam ${days} ${days === 1 ? 'dia' : 'dias'} pro mês começar (${startFmt})`;
    }
  } else if (dlStatus === 'urgent') {
    msg = `<strong>Urgente</strong> · ${days} dias pro mês começar (${startFmt})`;
  } else if (dlStatus === 'attention') {
    msg = `<strong>Atenção</strong> · ${days} dias pro mês começar (${startFmt})`;
  } else {
    msg = `${days} dias pro mês começar (${startFmt})`;
  }
  const ruleText = dlStatus === 'safe'
    ? 'prazo: 45 dias antes do mês'
    : 'atrasado < 30 dias · urgente 30-40 · atenção 40-45';

  container.innerHTML = `
    <div class="month-deadline-bar dl-${cls}">
      <span class="month-deadline-icon">${icon}</span>
      <span class="month-deadline-text">${msg}</span>
      <span class="month-deadline-rule">${ruleText}</span>
    </div>
  `;
}

    if (canUser('drag')) {

        card.classList.add('dragging');

        e.preventDefault();

      };

      card.ondrop = async (e) => {

        if (draggedId !== id) {
          await reorderModels(draggedId, id);
          renderCategories();
        }
      };
    }
  });

  // Lazy-load photos
  container.querySelectorAll('img[data-photo-id]').forEach(async img => {
    const photoId = img.dataset.photoId;
    const data = await loadPhoto(photoId);
    if (data) img.src = data;
  });
}

async function reorderModels(draggedId, targetId) {
  const dragged = findModel(state.currentYear, draggedId);
  const target = findModel(state.currentYear, targetId);
  if (!dragged || !target) return;
  // Only reorder within the same category/month/remessa
  if (dragged.category !== target.category ||
      dragged.month !== target.month ||
      dragged.remessaId !== target.remessaId) return;

  const peers = getModelsFor(state.currentYear, dragged.remessaId, dragged.month, dragged.category);
  // Filter out dragged
  const remaining = peers.filter(m => m.id !== draggedId);
  // Insert dragged before target
  const targetIdx = remaining.findIndex(m => m.id === targetId);
  remaining.splice(targetIdx, 0, dragged);
  // Reassign order based on new positions
  remaining.forEach((m, i) => {
    const stored = state.data[state.currentYear].models.find(x => x.id === m.id);
    if (stored) stored.order = i + 1;
  });
  await saveAll();
}

let modalState = {};

// Centralized photo handler — used by click-to-upload, drag & drop, and Ctrl+V paste
async function applyPhotoFile(file) {
  if (!file || !file.type || !file.type.startsWith('image/')) return;
  showToast('Processando foto...');
  try {
    const compressed = await compressImage(file);
    const newId = 'p_' + createModelId();
    if (modalState.photoId) await deletePhoto(modalState.photoId);
    modalState.photoId = newId;
    await savePhoto(newId, compressed);
    const photoDrop = document.getElementById('photoDrop');
    if (photoDrop) {
      photoDrop.classList.add('has-photo');
      photoDrop.innerHTML = `<img src="${compressed}"><input type="file" id="photoInput" accept="image/*" style="display:none"><div class="photo-replace">Trocar foto</div>`;
      const newInput = document.getElementById('photoInput');
      photoDrop.onclick = () => newInput.click();
      newInput.onchange = (e) => { const f = e.target.files[0]; if (f) applyPhotoFile(f); };
    }
    showToast('Foto adicionada');
  } catch (err) {
    showToast('Erro ao processar foto');
    console.error(err);
  }
}

                <button type="button" class="filter-pill ${modalState.leather === l.id ? 'active' : ''}" data-fleather="${l.id}" ${!editable ? 'disabled' : ''}>${l.label}</button>

        <div class="form-section-label">Identificação</div>

        <div class="form-section-label">Comercial</div>

          </div>
          <div class="field">
            <label>Quantidade de Pares</label>
            <input id="fPairs" type="number" inputmode="numeric" step="1" min="0" placeholder="0" value="${modalState.pairs || ''}" ${!editable ? 'disabled' : ''}>

        <div class="total-display" id="totalDisplay">

              <button type="button" class="filter-pill ${modalState.status === s.id ? 'active' : ''}" data-fstatus="${s.id}" ${!editable ? 'disabled' : ''}>${s.label}</button>

      ${isEdit ? `
        <div class="form-section">
          <div class="form-section-label">Localização</div>
          <div class="field">
            <label>Mês / Remessa</label>
            <select id="fMonth" ${!editable ? 'disabled' : ''}>
              ${REMESSAS.map(rm => `
                <optgroup label="${rm.label} Remessa">
                  ${rm.months.map(mo => `<option value="${mo}" ${mo === modalState.month ? 'selected' : ''}>${mo}${rm.campaigns[mo] ? ' · ' + rm.campaigns[mo] : ''}</option>`).join('')}

        </div>
      ` : ''}

      ${isEdit ? `
        <div class="form-section">
          <div class="form-section-label">Conversa</div>
          <div class="comments-section" style="border-top: none; padding-top: 0; margin-top: 0;">
            <div class="comments-header">
              💬 Comentários <span style="color:var(--gold);">${modalState.comments.length}</span>
            </div>
            <div class="comments-list" id="commentsList">
              ${renderCommentsHTML(modalState.comments)}
            </div>
            ${canComment ? `
              <div class="comment-form">
                <textarea id="newCommentText" placeholder="Escreva uma observação..." rows="2"></textarea>
                <button class="comment-send" id="sendCommentBtn">Enviar</button>
              </div>
            ` : ''}
          </div>

          ${modalState.history.length > 0 ? `
            <div class="history-section">
              <div class="comments-header">↻ Histórico</div>
              <div class="history-list">
                ${modalState.history.map(h => `
                  <div class="history-item">
                    <span class="history-time">${formatRelativeTime(h.time)}</span>
                    <span><strong style="color:var(--text);">${escapeHtml(h.userName)}</strong> · ${escapeHtml(h.action)}</span>
                  </div>
                `).join('')}
              </div>

      ` : ''}

    <div class="modal-footer">
      ${canDelete ? `<button class="btn btn-danger" id="modalDelete">Excluir</button>` : ''}
      ${canDup ? `<button class="btn btn-ghost" id="modalDuplicate" style="margin-right:auto;">⎘ Duplicar</button>` : ''}
      <button class="btn btn-ghost" id="modalCancel">Fechar</button>
      ${editable ? `<button class="btn btn-primary" id="modalSave">Salvar</button>` : ''}
    </div>
  `;

  // Load photo if exists
  if (modalState.photoId) {
    loadPhoto(modalState.photoId).then(data => {
      const preview = document.getElementById('photoPreview');
      if (preview && data) preview.src = data;
    });
  }

  if (editable) {
    const photoDrop = document.getElementById('photoDrop');
    const photoInput = document.getElementById('photoInput');
    photoDrop.onclick = () => photoInput.click();
    photoInput.onchange = (e) => { const f = e.target.files[0]; if (f) applyPhotoFile(f); };
    // Drag & drop
    photoDrop.ondragover = (e) => { e.preventDefault(); photoDrop.classList.add('drag-over'); };
    photoDrop.ondragleave = () => photoDrop.classList.remove('drag-over');
    photoDrop.ondrop = (e) => {
      e.preventDefault();
      photoDrop.classList.remove('drag-over');
      const f = e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) applyPhotoFile(f);
    };
  }
  // Enable Ctrl+V paste-to-photo while this modal is open and editable
  modalPhotoEditable = editable;

  // Bind status pills
  modal.querySelectorAll('[data-fstatus]').forEach(p => {
    p.onclick = () => {
      if (p.disabled) return;
      modalState.status = p.dataset.fstatus;
      modal.querySelectorAll('[data-fstatus]').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
    };
  });

  // Bind tag pills
  modal.querySelectorAll('[data-ftag]').forEach(p => {
    p.onclick = () => {
      if (p.disabled) return;
      const tagId = p.dataset.ftag;
      const idx = modalState.tags.indexOf(tagId);
      if (idx >= 0) {
        modalState.tags.splice(idx, 1);
        p.classList.remove('active');
      } else {
        modalState.tags.push(tagId);
        p.classList.add('active');
      }
    };
  });

  // Bind leather pills (single select)
  modal.querySelectorAll('[data-fleather]').forEach(p => {
    p.onclick = () => {
      if (p.disabled) return;
      const leatherId = p.dataset.fleather;
      if (modalState.leather === leatherId) {
        modalState.leather = '';
        p.classList.remove('active');
      } else {
        modalState.leather = leatherId;
        modal.querySelectorAll('[data-fleather]').forEach(x => x.classList.remove('active'));
        p.classList.add('active');
      }
    };
  });

  // Live total: cost × pairs
  const fCost = document.getElementById('fCost');
  const fPairs = document.getElementById('fPairs');
  const totalValueEl = document.getElementById('totalValue');

  function updateTotal() {
    const cost = parseFloat(fCost?.value) || 0;
    const pairs = parseInt(fPairs?.value, 10) || 0;
    const total = cost * pairs;
    if (!totalValueEl) return;
    if (total > 0) {
      totalValueEl.classList.remove('empty');
      totalValueEl.textContent = 'R$ ' + formatMoney(total);
    } else {
      totalValueEl.classList.add('empty');
      totalValueEl.textContent = 'preencha custo e pares';
    }
  }

  if (fCost) fCost.oninput = updateTotal;
  if (fPairs) fPairs.oninput = updateTotal;
  updateTotal();

  // Comments
  if (isEdit && canComment) {
    const sendBtn = document.getElementById('sendCommentBtn');
    const txtArea = document.getElementById('newCommentText');
    if (sendBtn && txtArea) {
      sendBtn.onclick = async () => {
        const text = txtArea.value.trim();
        if (!text) return;
        addComment(modalState, text);
        txtArea.value = '';
        await saveAll();
        document.getElementById('commentsList').innerHTML = renderCommentsHTML(modalState.comments);
        bindCommentDeletes();
        showToast('Comentário enviado');
      };
    }
    bindCommentDeletes();
  }

  // Buttons
  document.getElementById('modalClose').onclick = closeModal;
  document.getElementById('modalCancel').onclick = closeModal;
  const saveBtn = document.getElementById('modalSave');
  if (saveBtn) saveBtn.onclick = saveModelFromModal;
  if (canDelete) {
    document.getElementById('modalDelete').onclick = async () => {
      if (confirm(`Excluir "${modalState.name || 'este modelo'}"?`)) {
        await deleteModel(state.currentYear, modalState.id);
        closeModal();
        renderRemessaView();
        showToast('Modelo excluído');
      }
    };
  }
  if (canDup) {
    document.getElementById('modalDuplicate').onclick = async () => {
      const copy = await duplicateModel(state.currentYear, modalState.id);

        closeModal();

        setTimeout(() => openModelModal(copy.id), 400);

  if (editable) {
    setTimeout(() => {

      if (fName) fName.focus();

  }
}

function renderCommentsHTML(comments) {
  if (!comments || comments.length === 0) {
    return '<div class="comment-empty">Nenhum comentário ainda</div>';
  }
  return comments.map(c => {
    const canDel = state.currentUser === c.user;
    return `
      <div class="comment">
        <div class="comment-author">
          <span>${escapeHtml(c.userName)}</span>
          <span class="comment-time">${formatRelativeTime(c.time)}${canDel ? ` · <a href="#" data-del-comment="${c.id}" style="color:var(--text-3);">excluir</a>` : ''}</span>
        </div>
        <div class="comment-text">${escapeHtml(c.text)}</div>
      </div>
    `;
  }).join('');
}

function bindCommentDeletes() {
  const list = document.getElementById('commentsList');
  if (!list) return;
  list.querySelectorAll('[data-del-comment]').forEach(a => {
    a.onclick = async (e) => {
      e.preventDefault();
      const cid = a.dataset.delComment;
      deleteCommentById(modalState, cid);
      await saveAll();
      list.innerHTML = renderCommentsHTML(modalState.comments);
      bindCommentDeletes();
    };
  });
}

function formatRelativeTime(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  const hr = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if (min < 1) return 'agora';
  if (min < 60) return `${min}min`;
  if (hr < 24) return `${hr}h`;
  if (days < 30) return `${days}d`;
  const date = new Date(ts);
  return date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
}

async function saveModelFromModal() {
  const isNew = !state.data[state.currentYear]?.models?.find(m => m.id === modalState.id);

  modalState.category = document.getElementById('fCategory').value;
  modalState.supplier = document.getElementById('fSupplier').value;
  modalState.reference = document.getElementById('fRef').value.trim();
  modalState.name = document.getElementById('fName').value.trim();
  modalState.color = document.getElementById('fColor').value.trim();
  // leather is already in modalState (synced via pill click)
  const costRaw = document.getElementById('fCost').value;
  modalState.cost = costRaw ? parseFloat(costRaw) : 0;
  const pairsRaw = document.getElementById('fPairs').value;
  modalState.pairs = pairsRaw ? parseInt(pairsRaw, 10) : 0;

  if (!modalState.name) {
    showToast('Coloque pelo menos o nome do modelo');
    return;
  }

  // Detect month move (existing models only)
  let movedTo = null;
  const monthSel = document.getElementById('fMonth');
  if (monthSel && !isNew) {
    const targetMonth = monthSel.value;
    if (targetMonth && targetMonth !== modalState.month) {
      const oldMonth = modalState.month;
      modalState.month = targetMonth;
      modalState.remessaId = remessaIdForMonth(targetMonth);
      addHistory(modalState, `Movido de ${oldMonth} para ${targetMonth}`);
      movedTo = targetMonth;
    }
  }

  if (isNew) {
    // Make sure ownership is recorded for new models
    if (!modalState.createdBy) modalState.createdBy = state.currentUser;
    const ownerName = USERS[modalState.createdBy]?.name || 'Sistema';
    addHistory(modalState, `Modelo criado por ${ownerName}`);
  } else if (!movedTo) {
    addHistory(modalState, 'Modelo editado');
  }

  await upsertModel(state.currentYear, modalState);
  closeModal();
  renderRemessaView();
  showToast(isNew ? 'Modelo adicionado' : (movedTo ? `Modelo movido para ${movedTo}` : 'Modelo atualizado'));
}

function closeModal() {
  modalPhotoEditable = false;
  document.getElementById('modalBg').classList.remove('show');
}

// ============================================================
// COPY FROM PREV YEAR
// ============================================================
async function handleCopyFromPrevYear() {
  if (!canUser('copy')) return;
  const prevYear = state.currentYear - 1;
  const prev = getYearData(prevYear);
  const prevModels = prev.models.filter(m => m.remessaId === state.currentRemessa);

  if (prevModels.length === 0) {
    showToast(`Nenhum modelo encontrado em ${prevYear}`);
    return;
  }

  const ok = confirm(
    `Copiar ${prevModels.length} modelos de ${prevYear} (${REMESSAS.find(r => r.id === state.currentRemessa).label} Remessa) como base para ${state.currentYear}?\n\nOs modelos copiados:\n• Receberão novos IDs\n• Status voltará para "A Definir"\n• Aprovações e comentários serão limpos\n• Histórico recomeça`
  );
  if (!ok) return;

  let count = 0;
  for (const orig of prevModels) {
    const copy = JSON.parse(JSON.stringify(orig));
    copy.id = createModelId();
    copy.year = state.currentYear;
    copy.status = 'a_definir';
    copy.joiceApproved = false;
    copy.comments = [];
    copy.history = [];
    copy.order = Date.now() + count;
    copy.createdAt = Date.now();
    addHistory(copy, `Copiado de ${prevYear}`);
    await upsertModel(state.currentYear, copy);
    count++;
  }

  showToast(`${count} modelos copiados de ${prevYear}`);
  renderRemessaView();
}

    .filter(m => m.remessaId === state.currentRemessa && m.month === state.currentMonth)
    .map(migrateModel);

  if (models.length === 0) {
    showToast('Nenhum modelo para exportar');
    return;
  }

  showToast('Gerando arquivo Excel...');

  // Build HTML that Excel can open natively (.xls)
  // - All comments concatenated in one cell
  const headerStyle = `style="background:#1a1a1a;color:#c9a950;font-family:Georgia,serif;font-size:11px;padding:10px;text-align:center;font-weight:bold;border:1px solid #444;letter-spacing:0.1em;text-transform:uppercase"`;
  const cellStyle = `style="padding:8px;border:1px solid #ccc;font-family:Arial,sans-serif;font-size:11px;vertical-align:middle"`;
  const cellCenter = `style="padding:8px;border:1px solid #ccc;text-align:center;vertical-align:middle"`;

  const rows = models.map(m => {
    const tagLabels = (m.tags || [])
      .map(tid => CAMPAIGN_TAGS.find(t => t.id === tid)?.label)
      .filter(Boolean).join('; ');
    const leatherLabel = LEATHER_TYPES.find(l => l.id === m.leather)?.label || '';
    // Concatenate comments as text (with author and time)
    const commentsText = (m.comments || []).map(c => {
      const userName = USERS[c.user]?.name || c.userName || c.user || '';
      return `${userName}: ${c.text}`;
    }).join(' | ');

    return `
      <tr>
        <td ${cellStyle}>${escapeHtml(m.reference || '')}</td>
        <td ${cellStyle}><b>${escapeHtml(m.name || '')}</b></td>
        <td ${cellStyle}>${escapeHtml(m.category || '')}</td>
        <td ${cellStyle}>${escapeHtml(m.color || '')}</td>
        <td ${cellStyle}>${escapeHtml(leatherLabel)}</td>
        <td ${cellStyle}>${escapeHtml(m.supplier || '')}</td>
        <td ${cellStyle.replace('vertical-align:middle', 'vertical-align:middle;text-align:right')}>${formatMoney(m.cost || 0)}</td>
        <td ${cellCenter}>${m.pairs || 0}</td>
        <td ${cellStyle.replace('vertical-align:middle', 'vertical-align:middle;text-align:right;font-weight:bold;color:#c9a950')}>${formatMoney((m.cost || 0) * (m.pairs || 0))}</td>
        <td ${cellStyle}>${escapeHtml(tagLabels)}</td>
        <td ${cellStyle.replace('font-size:11px', 'font-size:10px')}>${escapeHtml(commentsText)}</td>
      </tr>
    `;
  }).join('');

  // Totals row
  const totalCost = models.reduce((s, m) => s + (m.cost || 0) * (m.pairs || 0), 0);
  const totalPairs = models.reduce((s, m) => s + (m.pairs || 0), 0);

  // Subtotal rows by category
  const catTotals = {};
  CATEGORIES.forEach(c => {
    catTotals[c] = { count: 0, pairs: 0, total: 0 };
  });
  models.forEach(m => {
    const cat = m.category;
    if (catTotals[cat]) {
      catTotals[cat].count += 1;
      catTotals[cat].pairs += (m.pairs || 0);
      catTotals[cat].total += (m.cost || 0) * (m.pairs || 0);
    }
  });

  const subtotalRows = CATEGORIES
    .filter(c => catTotals[c].count > 0)
    .map(c => {
      const ct = catTotals[c];
      return `
        <tr>
          <td colspan="6" style="padding:8px 10px;border:1px solid #d8d3bc;background:#f4f1e8;font-family:Arial,sans-serif;font-size:10px;text-align:right;color:#6e6a5d;text-transform:uppercase;letter-spacing:0.08em">Subtotal · ${c} (${ct.count} ${ct.count === 1 ? 'modelo' : 'modelos'})</td>
          <td style="padding:8px 10px;border:1px solid #d8d3bc;background:#f4f1e8;text-align:right;font-family:Arial,sans-serif;font-size:10px;color:#6e6a5d">—</td>
          <td style="padding:8px 10px;border:1px solid #d8d3bc;background:#f4f1e8;text-align:center;font-family:Arial,sans-serif;font-size:10px;color:#6e6a5d">${ct.pairs}</td>
          <td style="padding:8px 10px;border:1px solid #d8d3bc;background:#f4f1e8;text-align:right;font-family:Arial,sans-serif;font-size:11px;color:#8a6f2f;font-weight:bold">R$ ${formatMoney(ct.total)}</td>
          <td colspan="2" style="border:1px solid #d8d3bc;background:#f4f1e8"></td>
        </tr>
      `;
    }).join('');

  const totalRow = `
    ${subtotalRows}
    <tr>
      <td ${cellStyle} colspan="7" style="padding:12px 10px;border:1px solid #ccc;font-family:Arial,sans-serif;font-size:12px;font-weight:bold;text-align:right;background:#1a1a1a;color:#c9a950;text-transform:uppercase;letter-spacing:0.1em">TOTAL GERAL</td>
      <td ${cellCenter} style="padding:12px 10px;background:#1a1a1a;color:white;font-weight:bold;font-size:13px">${totalPairs}</td>
      <td style="padding:12px 10px;border:1px solid #ccc;text-align:right;background:#c9a950;color:#fff;font-family:Arial,sans-serif;font-size:14px;font-weight:bold">R$ ${formatMoney(totalCost)}</td>
      <td ${cellStyle} colspan="2" style="background:#1a1a1a"></td>
    </tr>
  `;

  const html = `<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">

    <td ${headerStyle}>Fornecedor</td>
    <td ${headerStyle}>Custo (R$)</td>
    <td ${headerStyle}>Pares</td>
    <td ${headerStyle}>Total (R$)</td>
    <td ${headerStyle}>Tags</td>
    <td ${headerStyle}>Comentários</td>
  </tr>
  ${rows}
  ${totalRow}
</table>
</body>
</html>`;

  const blob = new Blob(['\uFEFF' + html], { type: 'application/vnd.ms-excel;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Loretto_${state.currentYear}_${r.label}_${state.currentMonth}.xls`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Excel exportado com fotos');
}

// ============================================================
// COLLECTION SUMMARY (printable)
// ============================================================
async function handleGenerateSummary(monthFilter) {
  // Defensive: if called as event handler, monthFilter could be an Event object — ignore it
  if (monthFilter && typeof monthFilter !== 'string') monthFilter = undefined;

  const r = REMESSAS.find(x => x.id === state.currentRemessa);
  const yd = getYearData(state.currentYear);

  // If a specific month is requested, only process that one (used by Resumo Mensal).
  // Otherwise process the entire remessa (used by Resumo Geral).
  const monthsToProcess = monthFilter ? [monthFilter] : r.months;
  const isMonthly = !!monthFilter;

  // Build data per month/category
  const monthData = {};
  for (const month of monthsToProcess) {
    monthData[month] = {};
    for (const cat of CATEGORIES) {
      const models = yd.models
        .filter(m => m.remessaId === r.id && m.month === month && m.category === cat)
        .map(migrateModel);
      // Hydrate photos
      for (const m of models) {
        if (m.photoId) {
          m._photoData = await loadPhoto(m.photoId);
        }
      }
      monthData[month][cat] = models;
    }
  }

  let totalModels = 0;
  let totalApproved = 0;
  let totalPairs = 0;
  let totalInvestment = 0;
  // Track totals per category (for the new breakdown section)
  const categoryTotals = {};
  CATEGORIES.forEach(c => {
    categoryTotals[c] = { count: 0, pairs: 0, total: 0 };
  });
  // Track totals per month (only the months we're processing)
  const monthTotals = {};
  monthsToProcess.forEach(m => {
    monthTotals[m] = { count: 0, pairs: 0, total: 0 };
  });

  Object.entries(monthData).forEach(([month, mc]) => {
    Object.entries(mc).forEach(([cat, models]) => {
      models.forEach(m => {
        const pairs = m.pairs || 0;
        const cost = parseFloat(m.cost) || 0;
        const subtotal = cost * pairs;

        totalModels += 1;
        if (m.joiceApproved) totalApproved += 1;
        totalPairs += pairs;
        totalInvestment += subtotal;

        categoryTotals[cat].count += 1;
        categoryTotals[cat].pairs += pairs;
        categoryTotals[cat].total += subtotal;

        monthTotals[month].count += 1;
        monthTotals[month].pairs += pairs;
        monthTotals[month].total += subtotal;
      });
    });
  });

  const today = new Date().toLocaleDateString('pt-BR');

                            </div>
                          </div>
                        </div>
                      `;
                    }).join('')}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');
    })()}

    <div class="sup-footer-section">

            <span class="sup-recap-lbl">Modelos aprovados</span>

          </div>` : ''}
          ${!isMonthly ? `
          <div class="sup-recap-item">
            <span class="sup-recap-lbl">Meses na remessa</span>
            <span class="sup-recap-val">${monthsToProcess.filter(m => (monthTotals[m]?.count || 0) > 0).length} de ${r.months.length}</span>

        <div class="sup-signoff-team">Larissa Vieira · Joice Santos</div>

</div>
</body>
</html>`;

  // Open in new window
  const win = window.open('', '_blank');
  if (!win) {
    showToast('Permita popups para gerar o resumo');
    return;
  }
  win.document.write(html);
  win.document.close();
  showToast(isMonthly ? `Resumo de ${monthFilter} gerado` : 'Resumo gerado em nova aba');

// Wrapper that calls handleGenerateSummary filtered by the current month only
async function handleGenerateMonthSummary() {
  await handleGenerateSummary(state.currentMonth);
}

// ============================================================
// SUPPLIER SUMMARY (printable, grouped by supplier)
// ============================================================
async function handleGenerateSupplierSummary() {
  const r = REMESSAS.find(x => x.id === state.currentRemessa);
  const yd = getYearData(state.currentYear);

  // Get all models for the current month, grouped by supplier
  const models = yd.models
    .filter(m => m.remessaId === state.currentRemessa && m.month === state.currentMonth)
    .map(migrateModel);

  if (models.length === 0) {
    showToast('Nenhum modelo neste mês para exportar');
    return;
  }

  showToast('Gerando resumo por fornecedor...');

  // Hydrate photos
  for (const m of models) {
    if (m.photoId && !m._photoData) {
      try { m._photoData = await loadPhoto(m.photoId); } catch (err) {}
    }
  }

  // Group by supplier
  const bySupplier = {};
  for (const m of models) {
    const sup = m.supplier || 'Sem Fornecedor';
    if (!bySupplier[sup]) bySupplier[sup] = [];
    bySupplier[sup].push(m);
  }

  // Sort each supplier's models by category and reference
  for (const sup in bySupplier) {
    bySupplier[sup].sort((a, b) => {
      if (a.category !== b.category) return a.category.localeCompare(b.category);
      return (a.reference || '').localeCompare(b.reference || '');
    });
  }

  const today = new Date().toLocaleDateString('pt-BR');

  // Delivery deadline: 1 week before the month starts
  const monthStart = getMonthStartDate(state.currentYear, state.currentMonth);
  let deliveryDeadlineFmt = '';
  if (monthStart) {
    const deliveryDate = new Date(monthStart.getTime() - 7 * 24 * 60 * 60 * 1000);
    deliveryDeadlineFmt = deliveryDate.toLocaleDateString('pt-BR', {
      day: '2-digit', month: 'long', year: 'numeric'
    });
  }

  // Build one section per supplier (each on its own page when printed)
  const supplierSections = Object.keys(bySupplier).sort().map((sup, idx) => {
    const supModels = bySupplier[sup];
    const supTotal = supModels.reduce((s, m) => s + (m.cost || 0) * (m.pairs || 0), 0);
    const supPairs = supModels.reduce((s, m) => s + (m.pairs || 0), 0);

    const cards = supModels.map((m, modelIdx) => {
      const leatherLabel = LEATHER_TYPES.find(l => l.id === m.leather)?.label || '—';
      const commentsHTML = (m.comments || []).map(c => {
        const userName = USERS[c.user]?.name || c.userName || c.user || '';
        return `<div class="comment-line"><strong>${escapeHtml(userName)}:</strong> ${escapeHtml(c.text)}</div>`;
      }).join('');
      const total = (m.cost || 0) * (m.pairs || 0);
      return `
        <div class="sup-card">
          <div class="sup-card-num">${modelIdx + 1}</div>
          <div class="sup-card-photo">
            ${m._photoData
              ? `<img src="${m._photoData}" alt="">`
              : '<div class="photo-empty">Sem foto</div>'}
          </div>
          <div class="sup-card-info">
            <div class="sup-card-head">
              <div class="sup-card-title">
                <div class="ref">${escapeHtml(m.reference || '—')}</div>
                <div class="name">${escapeHtml(m.name || 'Sem nome')}</div>
              </div>
              <div class="cat-badge">${escapeHtml(m.category || '')}</div>
            </div>
            <div class="sup-card-specs">
              <div class="spec"><span class="spec-label">Cor</span><span class="spec-value">${escapeHtml(m.color || '—')}</span></div>
              <div class="spec"><span class="spec-label">Couro</span><span class="spec-value">${escapeHtml(leatherLabel)}</span></div>
              <div class="spec"><span class="spec-label">Custo Unit.</span><span class="spec-value">${formatPricePDF(m.cost || 0, { size: '14px' })}</span></div>
              <div class="spec"><span class="spec-label">Pares</span><span class="spec-value spec-pairs">${m.pairs || 0}</span></div>
              <div class="spec spec-total"><span class="spec-label">Total do modelo</span><span class="spec-value">${formatPricePDF(total, { size: '18px' })}</span></div>
            </div>
            ${commentsHTML ? `
              <div class="sup-card-notes">
                <div class="notes-label">Observações</div>
                ${commentsHTML}
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }).join('');

    return `
      <section class="supplier-section ${idx > 0 ? 'page-break' : ''}">
        <div class="sup-brand">
          <div class="sup-brand-logo"><em>Loretto</em> Scarpa</div>
          <div class="sup-brand-tag">Pedido de Coleção</div>
        </div>

        <div class="sup-header">
          <div class="sup-greeting">Olá, <strong>${escapeHtml(sup)}</strong> 👋</div>
          <h2>Pedido para <em>${state.currentMonth} ${state.currentYear}</em></h2>
          <div class="sup-meta">
            <span class="sup-meta-item">${r.label} Remessa${r.campaigns?.[state.currentMonth] ? ` · Campanha ${r.campaigns[state.currentMonth]}` : ''}</span>
            <span class="sup-meta-item">Emitido em ${today}</span>
          </div>

          <div class="sup-notices">

              <span class="sup-notice-icon">📷</span>

            </div>
            ${deliveryDeadlineFmt ? `

async function loadTheme() {
  try {
    if (hasStorage) {
      const result = await window.storage.get(THEME_KEY, false);
      if (result && result.value) state.theme = result.value;
    } else {
      const local = localStorage.getItem(THEME_KEY);
      if (local) state.theme = local;
    }
  } catch (err) { /* default */ }
  applyTheme();
}

function applyTheme() {
  if (state.theme === 'light') {
    document.body.classList.add('light-theme');
    document.getElementById('themeToggle').textContent = '☀';
  } else {
    document.body.classList.remove('light-theme');
    document.getElementById('themeToggle').textContent = '☾';
  }
}

async function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  try {
    if (hasStorage) await window.storage.set(THEME_KEY, state.theme, false);
    else localStorage.setItem(THEME_KEY, state.theme);
  } catch (err) { /* ignore */ }
}

async function loadViewMode() {
  try {
    if (hasStorage) {
      const result = await window.storage.get(VIEW_MODE_KEY, false);
      if (result && result.value) state.viewMode = result.value;
    } else {
      const local = localStorage.getItem(VIEW_MODE_KEY);
      if (local) state.viewMode = local;
    }
  } catch (err) { /* default */ }
}

// ============================================================
// TUTORIAL ENGINE
// ============================================================
const TUTORIAL_KEY_PREFIX = 'loretto_tutorial_done_';
let tutorialState = {
  active: false,
  step: 0,
  steps: []
};

async function shouldShowTutorial(userId) {
  if (!userId) return false;
  try {
    if (hasStorage) {
      const result = await window.storage.get(TUTORIAL_KEY_PREFIX + userId, false);
      return !(result && result.value === 'true');
    }
    return localStorage.getItem(TUTORIAL_KEY_PREFIX + userId) !== 'true';
  } catch (err) {
    return true;
  }
}

async function markTutorialDone(userId) {
  try {
    if (hasStorage) {
      await window.storage.set(TUTORIAL_KEY_PREFIX + userId, 'true', false);
    } else {
      localStorage.setItem(TUTORIAL_KEY_PREFIX + userId, 'true');
    }
  } catch (err) { /* ignore */ }
}

function startTutorial(userId) {
  const steps = TUTORIAL_STEPS[userId];
  if (!steps || steps.length === 0) return;
  tutorialState.active = true;
  tutorialState.step = 0;
  tutorialState.steps = steps;
  document.body.classList.add('tutorial-active');
  document.getElementById('tutorialOverlay').classList.add('show');
  showTutorialStep();
}

function endTutorial() {
  tutorialState.active = false;
  document.body.classList.remove('tutorial-active');
  document.getElementById('tutorialOverlay').classList.remove('show');
  if (state.currentUser) markTutorialDone(state.currentUser);
}

function showTutorialStep() {
  const step = tutorialState.steps[tutorialState.step];
  if (!step) return endTutorial();

  const overlay = document.getElementById('tutorialOverlay');
  const spotlight = document.getElementById('tutorialSpotlight');
  const card = document.getElementById('tutorialCard');

  // Build card content
  const totalSteps = tutorialState.steps.length;
  const stepNum = tutorialState.step + 1;

  card.className = 'tutorial-card ' + (step.arrow === 'no-arrow' ? 'no-arrow' : `arrow-${step.arrow || 'top'}`);

  card.innerHTML = `
    <div class="tutorial-step">
      <span>Tutorial</span>
      <span class="tutorial-step-number">${stepNum} / ${totalSteps}</span>
    </div>
    <div class="tutorial-title">${step.title}</div>
    <div class="tutorial-text">${step.text}</div>
    <div class="tutorial-actions">
      <div class="tutorial-dots">
        ${tutorialState.steps.map((_, i) =>
          `<div class="tutorial-dot ${i === tutorialState.step ? 'active' : ''}"></div>`
        ).join('')}
      </div>
      <div class="tutorial-buttons">
        ${tutorialState.step === 0 ?
          `<button class="tutorial-btn tutorial-btn-skip" id="tutorialSkip">Pular</button>` :
          `<button class="tutorial-btn tutorial-btn-back" id="tutorialBack">Voltar</button>`
        }
        <button class="tutorial-btn tutorial-btn-next" id="tutorialNext">${stepNum === totalSteps ? 'Pronto' : 'Próximo'}</button>
      </div>
    </div>
  `;

  // Bind buttons
  card.querySelector('#tutorialNext').onclick = nextTutorialStep;
  const back = card.querySelector('#tutorialBack');
  if (back) back.onclick = prevTutorialStep;
  const skip = card.querySelector('#tutorialSkip');
  if (skip) skip.onclick = endTutorial;

  // Position spotlight & card
  positionTutorialStep(step, spotlight, card);
}

function positionTutorialStep(step, spotlight, card) {
  const placement = step.placement || 'below';

  // Special: navigate to enter remessa first to find target
  if (step.placement === 'navigate-remessa') {
    // We need to be inside a remessa to highlight add-model
    if (state.view !== 'remessa') {
      // Auto-navigate to first remessa
      goToRemessa(1);
      // Wait for render and then re-position
      setTimeout(() => {
        const addBtn = document.querySelector('[data-add="Sneakers"]');
        if (addBtn) positionByElement(addBtn, spotlight, card, 'right');
        else positionCenter(spotlight, card);
      }, 600);
      return;
    }
    const addBtn = document.querySelector('[data-add="Sneakers"]');
    if (addBtn) {
      positionByElement(addBtn, spotlight, card, 'below');
    } else {
      positionCenter(spotlight, card);
    }
    return;
  }

  if (step.placement === 'card-detail') {
    // Highlight the joice-mark button on the first model card if there is one,
    // otherwise the add button area.
    if (state.view !== 'remessa') {
      goToRemessa(1);
      setTimeout(() => positionTutorialStep(step, spotlight, card), 600);
      return;
    }
    const card4 = document.querySelector('.model-card .joice-mark');
    if (card4) {
      positionByElement(card4, spotlight, card, 'left');
    } else {
      // Fall back to category area
      const cat = document.querySelector('.category');
      if (cat) positionByElement(cat, spotlight, card, 'top');
      else positionCenter(spotlight, card);
    }
    return;
  }

  if (step.placement === 'modal') {
    // For Joice tutorial — show in a way that hints at how to open a model
    if (state.view !== 'remessa') {
      goToRemessa(1);
      setTimeout(() => positionTutorialStep(step, spotlight, card), 600);
      return;
    }
    const card5 = document.querySelector('.model-card .model-photo');
    if (card5) {
      positionByElement(card5, spotlight, card, 'right');
    } else {
      positionCenter(spotlight, card);
    }
    return;
  }

  // Centered (no target)
  if (!step.target || placement === 'center') {
    positionCenter(spotlight, card);
    return;
  }

  // Find element by selector
  const el = document.querySelector(step.target);
  if (!el) {
    positionCenter(spotlight, card);
    return;
  }
  positionByElement(el, spotlight, card, placement);
}

function positionCenter(spotlight, card) {
  spotlight.style.opacity = '0';
  spotlight.style.width = '0';
  spotlight.style.height = '0';
  spotlight.style.top = '50%';
  spotlight.style.left = '50%';

  card.style.top = '50%';
  card.style.left = '50%';
  card.style.transform = 'translate(-50%, -50%)';
}

function positionByElement(el, spotlight, card, placement) {
  // Scroll element into view first (guarded - some environments lack this)
  if (typeof el.scrollIntoView === 'function') {
    try { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (err) {}
  }

  // Wait for scroll to settle
  setTimeout(() => {
    const rect = el.getBoundingClientRect();
    const padding = 8;

    spotlight.style.opacity = '1';
    spotlight.style.top  = (rect.top - padding) + 'px';
    spotlight.style.left = (rect.left - padding) + 'px';
    spotlight.style.width  = (rect.width + padding * 2) + 'px';
    spotlight.style.height = (rect.height + padding * 2) + 'px';

    // Position the card based on placement
    const cardRect = card.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const gap = 24;

    let cardTop, cardLeft;

    if (placement === 'below') {
      cardTop = rect.bottom + gap;
      cardLeft = rect.left + rect.width / 2 - cardRect.width / 2;
    } else if (placement === 'above') {
      cardTop = rect.top - cardRect.height - gap;
      cardLeft = rect.left + rect.width / 2 - cardRect.width / 2;
    } else if (placement === 'right') {
      cardTop = rect.top + rect.height / 2 - cardRect.height / 2;
      cardLeft = rect.right + gap;
    } else if (placement === 'left') {
      cardTop = rect.top + rect.height / 2 - cardRect.height / 2;
      cardLeft = rect.left - cardRect.width - gap;
    } else {
      cardTop = rect.bottom + gap;
      cardLeft = rect.left;
    }

    // Clamp to viewport
    cardLeft = Math.max(20, Math.min(cardLeft, vw - cardRect.width - 20));
    cardTop = Math.max(20, Math.min(cardTop, vh - cardRect.height - 20));

    card.style.top = cardTop + 'px';
    card.style.left = cardLeft + 'px';
    card.style.transform = 'none';
  }, 350);
}

function nextTutorialStep() {
  if (tutorialState.step >= tutorialState.steps.length - 1) {
    endTutorial();
    return;
  }
  tutorialState.step++;
  showTutorialStep();
}

function prevTutorialStep() {
  if (tutorialState.step === 0) return;
  tutorialState.step--;
  showTutorialStep();
}

// Re-position on resize/scroll while tutorial is active
window.addEventListener('resize', () => {
  if (tutorialState.active) showTutorialStep();
});

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function formatMoney(v) {
  if (!v) return '0,00';
  return Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// Standard price display for the in-app UI (uses CSS classes)
// Style based on the visual reference: small "R$" + gold italic Playfair value
function formatPrice(v) {
  return `<span class="price"><span class="price-currency">R$</span><span class="price-value">${formatMoney(v)}</span></span>`;
}

// Same look but with inline styles, for PDF popups (where our CSS classes aren't available)
function formatPricePDF(v, opts) {
  opts = opts || {};
  const valueColor = opts.color || '#5d6644';
  const currColor = opts.currColor || '#8a8270';
  const sizeRem = opts.size || '1em';
  return `<span style="display:inline-flex;align-items:baseline;gap:3px;line-height:1">` +
    `<span style="font-family:'Barlow',sans-serif;font-size:0.7em;color:${currColor};font-weight:500">R$</span>` +
    `<span style="font-family:'Barlow',sans-serif;color:${valueColor};font-weight:600;font-size:${sizeRem}">${formatMoney(v)}</span>` +
    `</span>`;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// Show a welcome toast on login if there are overdue/urgent months
function showDeadlineWelcomeToast() {
  const overdue = getOverdueMonths(state.currentYear);
  if (overdue.length === 0) return;
  const overdueOnly = overdue.filter(o => o.status === 'overdue');
  const urgentOnly = overdue.filter(o => o.status === 'urgent');

  let msg;
  if (overdueOnly.length > 0) {
    msg = `⚡ ${overdueOnly.length} mês${overdueOnly.length === 1 ? '' : 'es'} atrasad${overdueOnly.length === 1 ? 'o' : 'os'}`;
    if (urgentOnly.length > 0) msg += ` · ${urgentOnly.length} urgente${urgentOnly.length === 1 ? '' : 's'}`;
  } else {
    msg = `⏱ ${urgentOnly.length} mês${urgentOnly.length === 1 ? '' : 'es'} urgente${urgentOnly.length === 1 ? '' : 's'}`;
  }
  showToast(msg);
}
