// Renders top banner showing overdue/urgent months
function renderDeadlineBanner() {
  const container = document.getElementById('deadlineBanner');
  if (!container) return;

  const overdue = getOverdueMonths(state.currentYear);

  if (overdue.length === 0) {
    container.innerHTML = '';
    return;
  }

  // Group by status
  const overdueOnly = overdue.filter(o => o.status === 'overdue');
  const urgentOnly = overdue.filter(o => o.status === 'urgent');

  const items = overdue.map(o => {
    const r = REMESSAS.find(x => x.id === o.remessaId);
    const isOverdue = o.status === 'overdue';
    const days = o.days;
    let msg;
    if (isOverdue) {
      if (days < 0) {
        const d = Math.abs(days);
        msg = `<strong>mês iniciado há ${d} ${d === 1 ? 'dia' : 'dias'}</strong>`;
      } else {
        msg = `<strong>${days} ${days === 1 ? 'dia' : 'dias'}</strong> pro mês começar`;
      }
    } else {
      msg = `<strong>${days} dias</strong> pro mês começar`;
    }
    return `
      <button class="deadline-item ${o.status}" data-go-remessa="${o.remessaId}" data-go-month="${o.month}">
        <span class="deadline-item-icon">${isOverdue ? '⚡' : '⏱'}</span>
        <span class="deadline-item-month">${o.month}</span>
        <span class="deadline-item-rem">${r?.label || ''}</span>
        <span class="deadline-item-msg">${msg}</span>
      </button>
    `;
  }).join('');

  let headline;
  if (overdueOnly.length > 0 && urgentOnly.length > 0) {
    headline = `<strong>⚡ ${overdueOnly.length} atrasad${overdueOnly.length === 1 ? 'o' : 'os'}</strong> · ${urgentOnly.length} urgente${urgentOnly.length === 1 ? '' : 's'}`;
  } else if (overdueOnly.length > 0) {
    headline = `<strong>⚡ ${overdueOnly.length} mês${overdueOnly.length === 1 ? '' : 'es'} atrasad${overdueOnly.length === 1 ? 'o' : 'os'}</strong> — fechar urgente`;
  } else {
    headline = `<strong>⏱ ${urgentOnly.length} mês${urgentOnly.length === 1 ? '' : 'es'} urgente${urgentOnly.length === 1 ? '' : 's'}</strong>`;
  }

  const hasOverdue = overdueOnly.length > 0;

  container.innerHTML = `
    <div class="deadline-banner ${hasOverdue ? 'has-overdue' : 'critical-only'}" data-expanded="false">
      <div class="deadline-banner-head">
        <div class="deadline-banner-msg">${headline}</div>
        <div class="deadline-banner-actions">
          <button class="deadline-banner-toggle" id="deadlineBannerToggle">
            <span class="dl-toggle-text">Ver detalhes</span>
            <span class="dl-toggle-arrow">▾</span>
          </button>
          <button class="deadline-banner-close" id="deadlineBannerClose" title="Ocultar">×</button>
        </div>
      </div>
      <div class="deadline-banner-list">${items}</div>
    </div>
  `;

  // Toggle expand/collapse
  const toggleBtn = document.getElementById('deadlineBannerToggle');
  const bannerEl = container.querySelector('.deadline-banner');
  if (toggleBtn && bannerEl) {
    toggleBtn.onclick = () => {
      const expanded = bannerEl.getAttribute('data-expanded') === 'true';
      bannerEl.setAttribute('data-expanded', expanded ? 'false' : 'true');
      const txt = toggleBtn.querySelector('.dl-toggle-text');
      if (txt) txt.textContent = expanded ? 'Ver detalhes' : 'Ocultar detalhes';
    };
  }

  // Click items to navigate to that remessa+month
  container.querySelectorAll('[data-go-remessa]').forEach(btn => {
    btn.onclick = () => {
      const remessaId = parseInt(btn.dataset.goRemessa, 10);
      const month = btn.dataset.goMonth;
      state.currentRemessa = remessaId;
      state.currentMonth = month;
      state.view = 'remessa';
      render();
    };
  });

  // Allow user to dismiss for the session
  const closeBtn = document.getElementById('deadlineBannerClose');
  if (closeBtn) {
    closeBtn.onclick = () => {
      container.innerHTML = '';
      sessionStorage.setItem('deadline_banner_dismissed', '1');
    };
  }

  // Respect previous dismiss within the same session
  if (sessionStorage.getItem('deadline_banner_dismissed') === '1') {
    container.innerHTML = '';
  }
}

// ============================================================
// INIT
// ============================================================
document.getElementById('yearPrev').onclick = () => changeYear(-1);
document.getElementById('yearNext').onclick = () => changeYear(1);
document.getElementById('themeToggle').onclick = toggleTheme;
document.getElementById('helpBtn').onclick = () => {
  if (state.currentUser) startTutorial(state.currentUser);
};

// Brand click goes home
document.querySelector('.topbar .brand').onclick = () => {
  if (state.currentUser) goToYear();
};

document.getElementById('modalBg').onclick = (e) => {
  if (e.target.id === 'modalBg') closeModal();
};

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Ctrl+V / Cmd+V: paste an image straight into the open model modal's photo area
document.addEventListener('paste', (e) => {
  const modalOpen = document.getElementById('modalBg')?.classList.contains('show');
  if (!modalOpen || !modalPhotoEditable) return;
  const items = (e.clipboardData || window.clipboardData)?.items;
  if (!items) return;
  for (const it of items) {
    if (it.type && it.type.startsWith('image/')) {
      const file = it.getAsFile();
      if (file) {
        e.preventDefault();
        applyPhotoFile(file);
        return;
      }
    }
  }
});

(async () => {
  await loadTheme();
  await loadViewMode();

  // Sign out button
  const signoutBtn = document.getElementById('signoutBtn');
  if (signoutBtn) {
    signoutBtn.onclick = async () => {
      if (!confirm('Deseja sair?')) return;
      await firebaseSignOut();
    };
  }

  // Login form bindings
  const loginEmailEl = document.getElementById('loginEmail');
  const loginPasswordEl = document.getElementById('loginPassword');
  const loginSubmitEl = document.getElementById('loginSubmit');
  const loginModeToggleEl = document.getElementById('loginModeToggle');

  if (loginSubmitEl) loginSubmitEl.onclick = handleLogin;
  if (loginPasswordEl) loginPasswordEl.onkeydown = (e) => {
    if (e.key === 'Enter') handleLogin();
  };
  if (loginEmailEl) loginEmailEl.onkeydown = (e) => {
    if (e.key === 'Enter') {
      if (loginPasswordEl.value) handleLogin();
      else loginPasswordEl.focus();
    }
  };

  if (loginModeToggleEl) {
    loginModeToggleEl.onclick = async () => {
      const email = loginEmailEl.value.trim().toLowerCase();
      if (!email) {
        document.getElementById('loginError').textContent = 'Digite seu email primeiro';
        return;
      }
      if (!AUTHORIZED_USERS[email]) {
        document.getElementById('loginError').textContent = 'Email não autorizado';
        return;
      }
      try {
        await firebaseAuth.sendPasswordResetEmail(email);
        showToast('Email de recuperação enviado — confira sua caixa de entrada');
      } catch (err) {
        console.error(err);
        document.getElementById('loginError').textContent = 'Erro ao enviar email de recuperação';
      }
    };
  }

  if (firebaseEnabled) {
    // Firebase enabled — full auth flow
    if (loginModeToggleEl) loginModeToggleEl.style.display = '';

    firebaseAuth.onAuthStateChanged(async (user) => {
      try {
        if (user) {
          const email = user.email?.toLowerCase();
          if (!email || !AUTHORIZED_USERS[email]) {
            document.getElementById('loginError').textContent =
              'Email não autorizado para este sistema';
            await firebaseAuth.signOut();
            showLoginScreen();
            return;
          }
          // Authorized
          state.currentUser = AUTHORIZED_USERS[email];
          hideLoginScreen();
          if (signoutBtn) signoutBtn.style.display = '';

          await loadAll();
          startRealtimeSync();
          await render();

          // Welcome toast with overdue summary if any
          showDeadlineWelcomeToast();

          const showTut = await shouldShowTutorial(state.currentUser);
          if (showTut) {
            setTimeout(() => startTutorial(state.currentUser), 600);
          }
        } else {
          state.currentUser = null;
          if (signoutBtn) signoutBtn.style.display = 'none';
          showLoginScreen();
        }
      } catch (err) {
        console.error('Auth state change handler failed:', err);
        showToast('Erro ao carregar dados — recarregue a página');
      }
    });
  } else {
    // Firebase NOT configured — localStorage fallback flow with profile picker
    if (signoutBtn) signoutBtn.style.display = 'none';
    await loadAll();
    await loadCurrentUser();
    if (!state.currentUser || !USERS[state.currentUser]) {
      renderWelcome();
    } else {
      await render();
      showDeadlineWelcomeToast();
    }
  }
})();

</script>
